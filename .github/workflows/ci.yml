name: CI

# Runs on every push/PR to main — this is the gate release.yml's tag-triggered
# builds implicitly assume already passed. Without this, nothing actually
# verifies a commit builds before it gets tagged for release.
#
# Builds the same three platforms as release.yml (kept as separate,
# independent workflows rather than a shared reusable workflow, since their
# needs diverge: this one runs smoke tests and skips packaging, release.yml
# does the reverse) but goes further — it doesn't just build, it exercises
# the actual toolchain: compiles the standard library, scaffolds and builds
# a project with safeguard, runs safeguard's own check/lint/format/test
# subcommands, and does a wire-protocol smoke test against sc-lsp.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  # CodeGen.cpp uses Module::setTargetTriple(Triple)/getTargetTriple()
  # returning Triple (not std::string), the Triple-overload of
  # TargetRegistry::lookupTarget, and Intrinsic::getOrInsertDeclaration
  # (which fully replaced getDeclaration — no back-compat alias) — all of
  # which landed in LLVM's API somewhere between v18 and v21/22 and simply
  # don't exist on older LLVM. 21 is this project's documented minimum
  # (see docs/advanced/compiler.md); a CI run against 18 confirmed the
  # hard way that the minimum is a real requirement, not a suggestion.
  LLVM_VERSION: "21"

jobs:
  # ── macOS (Apple Silicon) ────────────────────────────────────────────────
  macos:
    runs-on: macos-14
    steps:
      - name: Checkout SafeC
        uses: actions/checkout@v4
        with:
          path: SafeC

      - name: Checkout sc-language-server
        uses: actions/checkout@v4
        with:
          repository: safec-org/sc-language-server
          path: sc-language-server

      - name: Install LLVM
        # Unversioned — Homebrew's llvm@N formulas are only kept around for
        # a few recent majors and can disappear from homebrew-core, while
        # plain 'llvm' always tracks current stable (>= this project's
        # minimum by construction, since that's what it's developed
        # against). Pinning to a specific old major here is what actually
        # caused the CI failure this fix addresses.
        run: brew install llvm

      - name: Build safec compiler
        run: |
          LLVM_DIR="$(brew --prefix llvm)/lib/cmake/llvm"
          echo "LLVM_DIR=$LLVM_DIR" >> "$GITHUB_ENV"
          cmake -S SafeC/compiler -B SafeC/compiler/build \
            -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_DIR"
          cmake --build SafeC/compiler/build -j "$(sysctl -n hw.ncpu)"

      - name: Build safeguard
        run: |
          cmake -S SafeC/safeguard -B SafeC/safeguard/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SafeC/safeguard/build -j "$(sysctl -n hw.ncpu)"

      - name: Build sc-lsp
        run: |
          cmake -S sc-language-server -B sc-language-server/build \
            -DCMAKE_BUILD_TYPE=Release -DSAFEC_DIR="$GITHUB_WORKSPACE/SafeC/compiler"
          cmake --build sc-language-server/build -j "$(sysctl -n hw.ncpu)"

      - name: Smoke tests
        run: bash SafeC/.github/scripts/smoke-test.sh
        env:
          SAFEC_BIN: ${{ github.workspace }}/SafeC/compiler/build/safec
          SAFEGUARD_BIN: ${{ github.workspace }}/SafeC/safeguard/build/safeguard
          SC_LSP_BIN: ${{ github.workspace }}/sc-language-server/build/sc-lsp
          SAFEC_HOME: ${{ github.workspace }}/SafeC
          CLANG_BIN: clang

  # ── Linux (x86_64) ────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SafeC
        uses: actions/checkout@v4
        with:
          path: SafeC

      - name: Checkout sc-language-server
        uses: actions/checkout@v4
        with:
          repository: safec-org/sc-language-server
          path: sc-language-server

      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_VERSION }}
          sudo apt-get install -y "llvm-${{ env.LLVM_VERSION }}-dev" "clang-${{ env.LLVM_VERSION }}"

      - name: Build safec compiler
        run: |
          LLVM_DIR="/usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/llvm"
          cmake -S SafeC/compiler -B SafeC/compiler/build \
            -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_DIR"
          cmake --build SafeC/compiler/build -j "$(nproc)"

      - name: Build safeguard
        run: |
          cmake -S SafeC/safeguard -B SafeC/safeguard/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SafeC/safeguard/build -j "$(nproc)"

      - name: Build sc-lsp
        run: |
          cmake -S sc-language-server -B sc-language-server/build \
            -DCMAKE_BUILD_TYPE=Release -DSAFEC_DIR="$GITHUB_WORKSPACE/SafeC/compiler"
          cmake --build sc-language-server/build -j "$(nproc)"

      - name: Smoke tests
        run: bash SafeC/.github/scripts/smoke-test.sh
        env:
          SAFEC_BIN: ${{ github.workspace }}/SafeC/compiler/build/safec
          SAFEGUARD_BIN: ${{ github.workspace }}/SafeC/safeguard/build/safeguard
          SC_LSP_BIN: ${{ github.workspace }}/sc-language-server/build/sc-lsp
          SAFEC_HOME: ${{ github.workspace }}/SafeC
          CLANG_BIN: clang-${{ env.LLVM_VERSION }}

  # ── Windows (x86_64) ──────────────────────────────────────────────────────
  # Same build steps as release.yml's windows job (LLVM via LLVM.org's own
  # prebuilt SDK archive, not Chocolatey or vcpkg — see that step's comment
  # for why).
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout SafeC
        uses: actions/checkout@v4
        with:
          path: SafeC

      - name: Checkout sc-language-server
        uses: actions/checkout@v4
        with:
          repository: safec-org/sc-language-server
          path: sc-language-server

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install LLVM (official prebuilt SDK archive)
        # Third attempt at Windows LLVM acquisition. Chocolatey's llvm
        # package wraps LLVM.org's installer .exe, which never ships
        # LLVMConfig.cmake at all (confirmed in a real CI run: it populated
        # C:/Program Files/LLVM but with no LLVMConfig.cmake anywhere in
        # it). vcpkg was the next attempt, but its llvm port is pinned to
        # v18.1.6 in the registry snapshot available here — below this
        # project's documented 21+ minimum — and classic-mode 'vcpkg
        # install' has no way to request a different port version.
        #
        # LLVM.org's own GitHub releases publish a second Windows archive
        # alongside the installer for exactly this situation: files named
        # 'clang+llvm-<version>-x86_64-pc-windows-msvc.tar.xz' are prebuilt
        # (not source — this is a download+extract, no from-source build
        # time or disk risk) and contain the full headers/libs/CMake config
        # needed to link against libLLVM, as opposed to the installer's
        # CLI-tools-only layout. Version pinned to 21.1.8 to match
        # LLVM_VERSION used on Linux and this project's documented minimum.
        #
        # 'find' locates LLVMConfig.cmake inside the extracted tree rather
        # than assuming an exact directory layout, and fails fast with a
        # directory dump if it's ever not where expected — cheaper to
        # diagnose than a downstream CMake failure.
        shell: bash
        run: |
          set -euo pipefail
          LLVM_PKG_VERSION="21.1.8"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_PKG_VERSION}/clang+llvm-${LLVM_PKG_VERSION}-x86_64-pc-windows-msvc.tar.xz"
          curl -fL -o llvm-sdk.tar.xz "$URL"
          mkdir -p /c/llvm-sdk
          tar -xf llvm-sdk.tar.xz -C /c/llvm-sdk

          FOUND="$(find /c/llvm-sdk -iname 'LLVMConfig.cmake' | head -1)"
          if [[ -z "$FOUND" ]]; then
            echo "::error::LLVMConfig.cmake not found after extracting the official LLVM SDK archive."
            echo "-- top-level contents of /c/llvm-sdk --"
            ls -la /c/llvm-sdk
            exit 1
          fi
          echo "Found: $FOUND"
          echo "LLVM_CMAKE_DIR=$(dirname "$FOUND")" >> "$GITHUB_ENV"

      - name: Work around LLVM's hardcoded DIA SDK path (llvm/llvm-project#86250)
        # LLVM.org's official Windows release archives have a long-standing,
        # still-unfixed bug (llvm/llvm-project#86250, #100372, #152268,
        # confirmed still present through LLVM 22.x — a different LLVM
        # version would not avoid this): LLVMExports.cmake hardcodes an
        # *absolute* path to diaguids.lib from whatever VS install/edition
        # built that specific release ("C:/Program Files
        # (x86)/Microsoft Visual Studio/2019/Professional/DIA
        # SDK/lib/amd64/diaguids.lib"), regardless of what's actually on the
        # consuming machine — this runner has a different VS edition
        # entirely. The confirmed community workaround (from that issue
        # thread) is to fabricate that exact fake path and populate it with
        # a copy of whatever DIA SDK actually exists on this runner's own
        # VS install; diaguids.lib only needs to be present to satisfy the
        # link step; safec never calls into LLVMDebugInfoPDB / the DIA-based
        # PDB reader, so which copy it is doesn't matter.
        shell: bash
        run: |
          set -euo pipefail
          SRC="$(find "/c/Program Files" "/c/Program Files (x86)" -maxdepth 6 -type d -iname 'DIA SDK' 2>/dev/null | head -1)"
          if [[ -z "$SRC" ]]; then
            echo "::error::Could not locate this runner's own DIA SDK (searched under Program Files and Program Files (x86)) to work around llvm/llvm-project#86250."
            exit 1
          fi
          DEST="/c/Program Files (x86)/Microsoft Visual Studio/2019/Professional"
          mkdir -p "$DEST"
          cp -r "$SRC" "$DEST/DIA SDK"
          echo "Copied DIA SDK from '$SRC' to '$DEST/DIA SDK'"

      - name: Build safec compiler
        shell: bash
        run: |
          cmake -S SafeC/compiler -B SafeC/compiler/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_CMAKE_DIR"
          cmake --build SafeC/compiler/build

      - name: Build safeguard
        shell: bash
        run: |
          cmake -S SafeC/safeguard -B SafeC/safeguard/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build SafeC/safeguard/build

      - name: Build sc-lsp
        shell: bash
        run: |
          cmake -S sc-language-server -B sc-language-server/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DSAFEC_DIR="$GITHUB_WORKSPACE/SafeC/compiler"
          cmake --build sc-language-server/build

      - name: Smoke tests
        shell: bash
        run: bash SafeC/.github/scripts/smoke-test.sh
        env:
          SAFEC_BIN: ${{ github.workspace }}/SafeC/compiler/build/safec.exe
          SAFEGUARD_BIN: ${{ github.workspace }}/SafeC/safeguard/build/safeguard.exe
          SC_LSP_BIN: ${{ github.workspace }}/sc-language-server/build/sc-lsp.exe
          SAFEC_HOME: ${{ github.workspace }}/SafeC
          CLANG_BIN: clang
